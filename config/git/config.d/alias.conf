# ========================================
# Git Aliases
# ========================================

[alias]
    # Status
    st = status -sb
    s = status

    # Log
    lg = log --graph --oneline --decorate --all
    lol = log --graph --decorate --pretty=oneline --abbrev-commit
    lola = log --graph --decorate --pretty=oneline --abbrev-commit --all
    l = log --pretty=format:'%C(yellow)%h %C(blue)%ad %C(red)%d %C(reset)%s %C(green)[%cn]' --date=short

    # Diff
    d = diff
    dc = diff --cached
    ds = diff --staged
    dw = diff --word-diff
    dm = diff main HEAD

    # Commit
    c = commit -v
    ca = commit --amend --reuse-message=HEAD
    cm = commit -m
    amend = commit --amend --no-edit
    fixup = commit --fixup

    # Add
    a = add
    aa = add --all
    ap = add --patch

    # Branch
    b = branch
    ba = branch -a
    bd = branch -d
    bD = branch -D
    branches = branch -a

    # Checkout/Switch
    co = checkout
    cob = checkout -b
    sw = switch
    swc = switch -c

    # Remote
    r = remote -v
    remotes = remote -v

    # Pull/Push
    pl = pull
    ps = push
    pf = push --force-with-lease

    # Clone
    cl = clone --recursive

    # Stash
    sl = stash list
    sa = stash apply
    ss = stash save
    sp = stash pop
    sd = stash drop

    # Reset/Restore
    unstage = reset HEAD --
    undo = reset --soft HEAD^

    # Rebase
    rb = rebase
    rbi = rebase -i
    rbc = rebase --continue
    rba = rebase --abort

    # Merge
    mg = merge
    mgnff = merge --no-ff

    # Tag
    t = tag
    tags = tag -l

    # Worktree
    wt = worktree
    wta = worktree add
    wtl = worktree list
    wtr = worktree remove

    # Skip/Track worktree
    skip = update-index --skip-worktree
    unskip = update-index --no-skip-worktree
    skipped = !git ls-files -v | grep ^S

    # Assume/Unassume unchanged
    ignore = update-index --assume-unchanged
    unignore = update-index --no-assume-unchanged
    ignored = !git ls-files -v | grep ^[a-z]

    # Other
    root = rev-parse --show-toplevel
    alias = config --get-regexp ^alias\\.
    contributors = shortlog --summary --numbered

