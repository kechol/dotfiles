# ========================================
# URL Shortcuts
# ========================================

# GitHub shortcuts
[url "git@github.com:"]
    insteadOf = gh:
    pushInsteadOf = github:
    pushInsteadOf = git://github.com/

[url "git://github.com/"]
    insteadOf = github:

# GitHub Gist shortcuts
[url "git@gist.github.com:"]
    insteadOf = gst:
    pushInsteadOf = gist:
    pushInsteadOf = git://gist.github.com/

[url "git://gist.github.com/"]
    insteadOf = gist:
